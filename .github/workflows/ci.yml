name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  app-checks:
    name: Core Release Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run core release gates
        run: npm run check:release

  verify-rsvp-schema:
    name: Verify RSVP Schema Contract
    runs-on: ubuntu-latest
    needs: app-checks
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure SUPABASE_DB_URL is configured
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "Missing required repository secret: SUPABASE_DB_URL"
            exit 1
          fi

      - name: Verify RSVP DB schema
        run: npm run verify:rsvp-schema
